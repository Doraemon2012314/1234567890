<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGFRP Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0e27;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: #e5e7eb;
        }
        .header {
            background: #0f1433;
            border-bottom: 1px solid #1a2050;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logo-icon {
            background: #1e3a8a;
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        .logo-text h2 {
            font-size: 18px;
            color: white;
        }
        .logo-text p {
            font-size: 12px;
            color: #6b7280;
        }
        .user-area {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .username {
            color: #9ca3af;
            font-size: 14px;
        }
        .btn-admin {
            background: #1e3a8a;
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 13px;
            color: white;
            text-decoration: none;
        }
        .btn-logout {
            background: #7f1d1d;
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 13px;
            color: #fca5a5;
            cursor: pointer;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px;
        }
        .phase-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 24px;
            justify-content: center;
        }
        .phase-btn {
            background: #0f1433;
            border: 1px solid #1f2940;
            padding: 12px 24px;
            border-radius: 12px;
            color: #9ca3af;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
        }
        .phase-btn small {
            display: block;
            font-size: 11px;
            margin-top: 4px;
        }
        .phase-btn.active {
            background: #1e3a8a;
            border-color: #3b82f6;
            color: white;
        }
        .info-bar {
            background: #0f1433;
            border: 1px solid #1a2050;
            border-radius: 12px;
            padding: 16px 20px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        .info-title {
            color: white;
            font-weight: 600;
        }
        .info-score {
            color: #9ca3af;
            font-size: 14px;
        }
        .action-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            justify-content: flex-end;
            flex-wrap: wrap;
        }
        .action-btn {
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            border: none;
        }
        .action-btn.green {
            background: #064e3b;
            color: #6ee7b7;
        }
        .action-btn.blue {
            background: #1e3a8a;
            color: #93c5fd;
        }
        .action-btn.gray {
            background: #1f2937;
            color: #9ca3af;
        }
        .questions-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .question-card {
            background: #0f1433;
            border: 1px solid #1a2050;
            border-radius: 12px;
            padding: 20px;
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .q-badge {
            background: #1e3a8a;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            color: white;
        }
        .edit-btn {
            background: none;
            border: none;
            color: #6b7280;
            cursor: pointer;
            font-size: 18px;
            padding: 4px 8px;
            border-radius: 6px;
        }
        .edit-btn:hover {
            background: #1f2937;
            color: white;
        }
        .question-text {
            color: white;
            font-size: 16px;
            margin-bottom: 16px;
        }
        .answer-box {
            background: #0a0e24;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 12px;
        }
        .answer-label {
            color: #22c55e;
            font-size: 12px;
            margin-bottom: 6px;
        }
        .answer-text {
            color: #d1d5db;
            font-size: 14px;
        }
        .keywords {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .keyword-tag {
            background: #1f2937;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            color: #9ca3af;
        }
        .empty-state {
            text-align: center;
            padding: 48px;
            background: #0f1433;
            border-radius: 12px;
            color: #6b7280;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: #0f1433;
            border: 1px solid #2a3760;
            border-radius: 16px;
            width: 90%;
            max-width: 700px;
            max-height: 85vh;
            overflow-y: auto;
        }
        .modal-header {
            padding: 20px;
            border-bottom: 1px solid #1f2940;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-header h3 {
            color: white;
        }
        .close-modal {
            background: none;
            border: none;
            color: #6b7280;
            font-size: 24px;
            cursor: pointer;
        }
        .modal-body {
            padding: 20px;
        }
        .modal-footer {
            padding: 16px 20px;
            border-top: 1px solid #1f2940;
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            color: #9ca3af;
            font-size: 13px;
            margin-bottom: 6px;
        }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 10px 12px;
            background: #0a0e24;
            border: 1px solid #1f2940;
            border-radius: 8px;
            color: white;
            font-size: 14px;
        }
        .btn-save {
            background: #1e3a8a;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
        }
        .btn-delete {
            background: #7f1d1d;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            color: #fca5a5;
            cursor: pointer;
        }
        .btn-cancel {
            background: #1f2937;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            color: #9ca3af;
            cursor: pointer;
        }
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: #1f2937;
            padding: 12px 20px;
            border-radius: 8px;
            color: white;
            font-size: 14px;
            display: none;
            z-index: 1100;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo-area">
            <div class="logo-icon">🛡️</div>
            <div class="logo-text">
                <h2>SGFRP Informational Phases</h2>
                <p>Admin Management Dashboard</p>
            </div>
        </div>
        <div class="user-area">
            <span class="username" id="currentUser">Loading...</span>
            <a href="admin.html" class="btn-admin">👥 Users</a>
            <span class="btn-logout" onclick="logout()">🚪 Logout</span>
        </div>
    </div>

    <div class="container">
        <div class="phase-tabs">
            <button class="phase-btn active" data-phase="001">📁 Info 001<br><small>Game Management</small></button>
            <button class="phase-btn" data-phase="002">💬 Info 002<br><small>Community Moderation</small></button>
            <button class="phase-btn" data-phase="003">📋 Info 003<br><small>Appeal Management</small></button>
            <button class="phase-btn" data-phase="004">🔒 Info 004<br><small>Event Security</small></button>
        </div>

        <div id="infoBar" class="info-bar">
            <span class="info-title">Game Management</span>
            <span class="info-score">Need 7/9 to pass</span>
        </div>

        <div class="action-bar">
            <button class="action-btn green" onclick="openAddModal()">➕ Add Question</button>
            <button class="action-btn blue" onclick="openSettingsModal()">⚙️ Phase Settings</button>
            <button class="action-btn gray" onclick="exportData()">📥 Export Backup</button>
        </div>

        <div id="questionsContainer" class="questions-list">
            <div class="empty-state">Loading questions...</div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>✏️ Edit Question</h3>
                <button class="close-modal" onclick="closeModal('editModal')">×</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Question Number</label>
                    <input type="number" id="editNumber">
                </div>
                <div class="form-group">
                    <label>Question Text</label>
                    <textarea id="editQuestion" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label>Correct Answer</label>
                    <textarea id="editAnswer" rows="4"></textarea>
                </div>
                <div class="form-group">
                    <label>Keywords (comma separated)</label>
                    <input type="text" id="editKeywords" placeholder="keyword1, keyword2">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-delete" onclick="deleteQuestion()">🗑️ Delete</button>
                <button class="btn-cancel" onclick="closeModal('editModal')">Cancel</button>
                <button class="btn-save" onclick="saveQuestion()">💾 Save</button>
            </div>
        </div>
    </div>

    <!-- Add Modal -->
    <div id="addModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>➕ Add New Question</h3>
                <button class="close-modal" onclick="closeModal('addModal')">×</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Question Number</label>
                    <input type="number" id="addNumber">
                </div>
                <div class="form-group">
                    <label>Question Text</label>
                    <textarea id="addQuestion" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label>Correct Answer</label>
                    <textarea id="addAnswer" rows="4"></textarea>
                </div>
                <div class="form-group">
                    <label>Keywords (comma separated)</label>
                    <input type="text" id="addKeywords" placeholder="keyword1, keyword2">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-cancel" onclick="closeModal('addModal')">Cancel</button>
                <button class="btn-save" onclick="addQuestion()">➕ Add</button>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settingsModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>⚙️ Phase Settings</h3>
                <button class="close-modal" onclick="closeModal('settingsModal')">×</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Phase Name</label>
                    <input type="text" id="settingsName">
                </div>
                <div class="form-group">
                    <label>Total Questions</label>
                    <input type="number" id="settingsTotal">
                </div>
                <div class="form-group">
                    <label>Passing Score</label>
                    <input type="number" id="settingsPassing">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-cancel" onclick="closeModal('settingsModal')">Cancel</button>
                <button class="btn-save" onclick="saveSettings()">💾 Save</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, collection, getDocs, addDoc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD1LtDoqN6yMP70xLbY_8HRkM4STJvFk0M",
            authDomain: "project-6644503116144405608.firebaseapp.com",
            projectId: "project-6644503116144405608",
            storageBucket: "project-6644503116144405608.firebasestorage.app",
            messagingSenderId: "565051436196",
            appId: "1:565051436196:web:87b40921cd6db7c0548a31",
            measurementId: "G-JXGMLVT038"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        let currentPhase = '001';
        let currentEditId = null;
        let currentUser = null;
        
        const phaseSettings = {
            '001': { name: 'Game Management', total: 9, passing: 7 },
            '002': { name: 'Community Moderation', total: 9, passing: 8 },
            '003': { name: 'Appeal Management', total: 10, passing: 7 },
            '004': { name: 'Event Management & Security', total: 10, passing: 7 }
        };
        
        const DEFAULT_QUESTIONS = {
            '001': [
                { id: 1, question: 'What is game moderation?', correct_answer: 'Maintaining a professional standard while handling in-game issues.', keywords: ['maintaining', 'professional standard'] },
                { id: 2, question: 'How many moderation stages are there?', correct_answer: '5', keywords: ['5', 'five'] },
                { id: 3, question: 'What is the third moderation step?', correct_answer: 'Check Past Infractions and Find the Correct Punishment.', keywords: ['check past infractions', 'find correct punishment'] },
                { id: 4, question: 'Why is it important to log everything?', correct_answer: 'It protects you as a moderator, helps the team track repeat offenders, and ensures consistency across the staff team.', keywords: ['protects', 'track repeat offenders', 'consistency'] },
                { id: 5, question: 'What is the fourth step of moderation?', correct_answer: 'Request or Carry Out the Punishment.', keywords: ['request', 'carry out', 'punishment'] },
                { id: 6, question: 'Why is it important to wait before jumping into a situation?', correct_answer: 'To understand the full context, take mental notes, and see if the situation can de-escalate itself.', keywords: ['full context', 'mental notes', 'de-escalate'] },
                { id: 7, question: 'What is the first step of moderation?', correct_answer: 'Observe and Take Note.', keywords: ['observe', 'take note'] },
                { id: 8, question: 'What type of proof is accepted?', correct_answer: 'Recordings or screenshots that show the player\'s name and the specific violation clearly.', keywords: ['recordings', 'screenshots', 'player name'] },
                { id: 9, question: 'Where do we record proof?', correct_answer: 'In the staff logs (player database).', keywords: ['staff logs', 'player database'] }
            ],
            '002': [
                { id: 1, question: 'What is community moderation?', correct_answer: 'Managing a chat environment on social platforms, focusing on speed and maintaining a positive vibe.', keywords: ['chat environment', 'speed', 'positive vibe'] },
                { id: 2, question: 'Why is community moderation different than game moderation?', correct_answer: 'It requires different skills: managing conversation flow, using screenshots/audit logs instead of in-game recordings, and prioritizing speed and positive vibe.', keywords: ['different skills', 'conversation flow', 'audit logs'] },
                { id: 3, question: 'Why do we have community moderators?', correct_answer: 'To make the community a welcoming place for everyone and stop problems before they grow.', keywords: ['welcoming place', 'stop problems'] },
                { id: 4, question: 'What is the very first step a community moderator should take when overseeing a text channel?', correct_answer: 'Monitor and take note of the conversation flow.', keywords: ['monitor', 'take note'] },
                { id: 5, question: 'When gathering proof for a rule violation, which details are most critical to include in your evidence?', correct_answer: 'Clear screenshots showing the user identification and timestamp, or use logging tools/audit logs.', keywords: ['screenshots', 'timestamp', 'audit logs'] },
                { id: 6, question: 'Why is it important to check a user\'s past infractions before deciding on a punishment?', correct_answer: 'A minor first offense may only need a verbal reminder, while repeated infractions require a firmer response.', keywords: ['verbal reminder', 'repeated infractions'] },
                { id: 7, question: 'What is the recommended action if an entire chat channel is becoming chaotic and hard to manage?', correct_answer: 'Apply a slow mode to the channel.', keywords: ['slow mode'] },
                { id: 8, question: 'What is the primary purpose of the final step: Log Your Punishment?', correct_answer: 'So the staff team stays coordinated across all shifts, and other moderators can review the case if needed.', keywords: ['coordinated', 'review the case'] },
                { id: 9, question: 'Where do we record proof?', correct_answer: 'In the staff database, saving screenshots and logging the context/conversation.', keywords: ['staff database', 'saving screenshots'] }
            ],
            '003': [
                { id: 1, question: 'Why is it essential for the staff member claiming an appeal ticket to be impartial?', correct_answer: 'The moderator who claims the ticket must have had no involvement in the original case. Objectivity is the priority.', keywords: ['no involvement', 'original case', 'objectivity'] },
                { id: 2, question: 'What is the first step a staff member must take after claiming an appeal ticket?', correct_answer: 'Revision of punishment and evidence provided by the prosecutor.', keywords: ['revision', 'punishment', 'evidence'] },
                { id: 3, question: 'In step two, what is the primary focus when revising the prosecutor\'s evidence?', correct_answer: 'Determine if the evidence actually supports the rule break that was cited.', keywords: ['determine', 'evidence', 'supports'] },
                { id: 4, question: 'What should an adjudicator look for when reviewing evidence provided by the defense?', correct_answer: 'Read the user\'s explanation and examine any counter-proof they have submitted.', keywords: ['explanation', 'counter-proof'] },
                { id: 5, question: 'Who must grant permission before an appeal decision is finalized and communicated?', correct_answer: 'An HQ member.', keywords: ['HQ', 'member'] },
                { id: 6, question: 'What are the three possible outcomes that can be reached during the decision step?', correct_answer: 'Uphold the original penalty, reduce it, or overturn it entirely.', keywords: ['uphold', 'reduce', 'overturn'] },
                { id: 7, question: 'What is the duration and purpose of the probation period for an approved appeal?', correct_answer: '1 week to ensure the reinstated user can follow the rules.', keywords: ['1 week', 'follow the rules'] },
                { id: 8, question: 'How often is a user monitored during the final surveillance step of the process?', correct_answer: 'Once every thirty days.', keywords: ['once', 'thirty days'] },
                { id: 9, question: 'What happens if a user commits a rule violation during their one-week probation?', correct_answer: 'Immediate return of the ban.', keywords: ['immediate', 'return', 'ban'] },
                { id: 10, question: 'Why is the monthly surveillance step scheduled to last for a total of three months?', correct_answer: 'Long-term monitoring ensures the user has successfully reformed their behavior.', keywords: ['long-term monitoring', 'reformed'] }
            ],
            '004': [
                { id: 1, question: 'Why is it important to identify choke points before an event starts?', correct_answer: 'Areas where lag or conflict may occur; allows rapid response to disruption.', keywords: ['choke points', 'lag', 'rapid response'] },
                { id: 2, question: 'What is the primary benefit of assigning moderators to specific coordinates?', correct_answer: 'Ensures largest gatherings remain safe and enjoyable.', keywords: ['safe', 'enjoyable'] },
                { id: 3, question: 'What should a moderator look for when monitoring for technical exploits?', correct_answer: 'Watch for players exploiting, report to devs to improve shield.', keywords: ['exploiting', 'report', 'shield'] },
                { id: 4, question: 'How do you distinguish between a harmless player and a security threat?', correct_answer: 'Threat = trolling, exploiting, flying. Harmless = just wants to enjoy.', keywords: ['trolling', 'exploiting', 'flying'] },
                { id: 5, question: 'What moderation tools can be used for Crowd Stabilization?', correct_answer: 'Freeze and teleport to move disruptors away.', keywords: ['freeze', 'teleport'] },
                { id: 6, question: 'Why is it important to maintain a calm demeanor during a security breach?', correct_answer: 'If you stay calm, community stays at ease. Panic causes panic.', keywords: ['stay calm', 'panic'] },
                { id: 7, question: 'What is the final step after an event has successfully concluded?', correct_answer: 'Post-event analysis and logging.', keywords: ['post-event analysis', 'logging'] },
                { id: 8, question: 'How does post-event logging assist the development team?', correct_answer: 'Helps developers build a stronger shield for future events.', keywords: ['developers', 'stronger shield'] },
                { id: 9, question: 'What is the moderator\'s role during Perimeter Monitoring?', correct_answer: 'To watch the crowd for exploiters.', keywords: ['watch', 'crowd', 'exploiters'] },
                { id: 10, question: 'How does moving a disruptor to a different coordinate help the event?', correct_answer: 'Event resumes normally with no trolls or exploiters.', keywords: ['resume normally', 'no trolls'] }
            ]
        };
        
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 3000);
        }
        
        async function loadQuestions() {
            const container = document.getElementById('questionsContainer');
            const settings = phaseSettings[currentPhase];
            
            document.getElementById('infoBar').innerHTML = `
                <span class="info-title">📌 ${settings.name}</span>
                <span class="info-score">Need ${settings.passing}/${settings.total} to pass</span>
            `;
            
            const questionsRef = collection(db, `phases/${currentPhase}/questions`);
            const snapshot = await getDocs(questionsRef);
            let questions = [];
            snapshot.forEach(doc => questions.push({ firestoreId: doc.id, ...doc.data() }));
            
            if (questions.length === 0 && DEFAULT_QUESTIONS[currentPhase]) {
                for (const q of DEFAULT_QUESTIONS[currentPhase]) {
                    await addDoc(collection(db, `phases/${currentPhase}/questions`), q);
                }
                questions = DEFAULT_QUESTIONS[currentPhase].map(q => ({ ...q }));
            }
            
            questions.sort((a,b) => a.id - b.id);
            
            if (questions.length === 0) {
                container.innerHTML = `<div class="empty-state">No questions. Click "Add Question" to start.</div>`;
                return;
            }
            
            container.innerHTML = questions.map(q => `
                <div class="question-card">
                    <div class="card-header">
                        <span class="q-badge">Q${q.id}</span>
                        <button class="edit-btn" onclick="openEditModal('${q.firestoreId}', ${q.id}, \`${escapeHtml(q.question)}\`, \`${escapeHtml(q.correct_answer)}\`, '${(q.keywords || []).join(',')}')">✏️</button>
                    </div>
                    <div class="question-text">${escapeHtml(q.question)}</div>
                    <div class="answer-box">
                        <div class="answer-label">✓ Correct Answer</div>
                        <div class="answer-text">${escapeHtml(q.correct_answer)}</div>
                    </div>
                    <div class="keywords">
                        ${(q.keywords || []).map(k => `<span class="keyword-tag">${escapeHtml(k)}</span>`).join('')}
                    </div>
                </div>
            `).join('');
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        window.openEditModal = (id, num, question, answer, keywords) => {
            currentEditId = id;
            document.getElementById('editNumber').value = num;
            document.getElementById('editQuestion').value = question;
            document.getElementById('editAnswer').value = answer;
            document.getElementById('editKeywords').value = keywords;
            document.getElementById('editModal').style.display = 'flex';
        };
        
        window.saveQuestion = async () => {
            const data = {
                id: parseInt(document.getElementById('editNumber').value),
                question: document.getElementById('editQuestion').value,
                correct_answer: document.getElementById('editAnswer').value,
                keywords: document.getElementById('editKeywords').value.split(',').map(k => k.trim())
            };
            const ref = doc(db, `phases/${currentPhase}/questions`, currentEditId);
            await updateDoc(ref, data);
            closeModal('editModal');
            loadQuestions();
            showToast('Question updated');
        };
        
        window.deleteQuestion = async () => {
            if (confirm('Delete this question?')) {
                const ref = doc(db, `phases/${currentPhase}/questions`, currentEditId);
                await deleteDoc(ref);
                closeModal('editModal');
                loadQuestions();
                showToast('Question deleted');
            }
        };
        
        window.openAddModal = () => {
            document.getElementById('addNumber').value = '';
            document.getElementById('addQuestion').value = '';
            document.getElementById('addAnswer').value = '';
            document.getElementById('addKeywords').value = '';
            document.getElementById('addModal').style.display = 'flex';
        };
        
        window.addQuestion = async () => {
            const data = {
                id: parseInt(document.getElementById('addNumber').value),
                question: document.getElementById('addQuestion').value,
                correct_answer: document.getElementById('addAnswer').value,
                keywords: document.getElementById('addKeywords').value.split(',').map(k => k.trim())
            };
            await addDoc(collection(db, `phases/${currentPhase}/questions`), data);
            closeModal('addModal');
            loadQuestions();
            showToast('Question added');
        };
        
        window.openSettingsModal = () => {
            const s = phaseSettings[currentPhase];
            document.getElementById('settingsName').value = s.name;
            document.getElementById('settingsTotal').value = s.total;
            document.getElementById('settingsPassing').value = s.passing;
            document.getElementById('settingsModal').style.display = 'flex';
        };
        
        window.saveSettings = async () => {
            phaseSettings[currentPhase] = {
                name: document.getElementById('settingsName').value,
                total: parseInt(document.getElementById('settingsTotal').value),
                passing: parseInt(document.getElementById('settingsPassing').value)
            };
            await setDoc(doc(db, 'phaseSettings', currentPhase), phaseSettings[currentPhase]);
            closeModal('settingsModal');
            loadQuestions();
            showToast('Settings saved');
        };
        
        window.exportData = () => {
            const data = { questions: DEFAULT_QUESTIONS, settings: phaseSettings };
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `sgfrp_backup.json`;
            a.click();
            URL.revokeObjectURL(url);
            showToast('Exported');
        };
        
        window.closeModal = (id) => {
            document.getElementById(id).style.display = 'none';
        };
        
        window.logout = () => {
            sessionStorage.removeItem('sgfrp_user');
            window.location.href = 'login.html';
        };
        
        document.querySelectorAll('.phase-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.phase-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentPhase = btn.dataset.phase;
                loadQuestions();
            });
        });
        
        // Check login
        const savedUser = sessionStorage.getItem('sgfrp_user');
        if (!savedUser) {
            window.location.href = 'login.html';
        } else {
            currentUser = JSON.parse(savedUser);
            document.getElementById('currentUser').textContent = currentUser.username;
            loadQuestions();
        }
    </script>
</body>
</html>
