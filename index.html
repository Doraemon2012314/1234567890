        .phase-btn.active {

            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        ::-webkit-scrollbar-track { background: #1e1e2e; }

        const firebaseConfig = {

            authDomain: "project-6644503116144405608.firebaseapp.com",
            projectId: "project-6644503116144405608",

        // Phase settings
        const phaseSettings = {

                { id: 9, question: 'Where do we record proof?', correct_answer: 'In the staff logs (player database).', keywords: ['staff logs', 'player database', 'logs'] }
            ],
            '002': [
                { id: 1, question: 'What is community moderation?', correct_answer: 'Managing a chat environment on social platforms, focusing on speed and maintaining a positive vibe.', keywords: ['managing', 'chat environment', 'social platforms', 'speed', 'positive vibe'] },
                { id: 2, question: 'Why is community moderation different than game moderation?', correct_answer: 'It requires different skills: managing conversation flow, using screenshots/audit logs instead of in-game recordings, and prioritizing speed and positive vibe.', keywords: ['different skills', 'conversation flow', 'screenshots', 'audit logs', 'speed', 'positive vibe'] },
                { id: 3, question: 'Why do we have community moderators?', correct_answer: 'To make the community a welcoming place for everyone and stop problems before they grow.', keywords: ['welcoming place', 'stop problems', 'before they grow'] },
                { id: 4, question: 'What is the very first step a community moderator should take when overseeing a text channel?', correct_answer: 'Monitor and take note of the conversation flow.', keywords: ['monitor', 'take note', 'conversation flow'] },
                { id: 5, question: 'When gathering proof for a rule violation, which details are most critical to include in your evidence?', correct_answer: 'Clear screenshots showing the user identification and timestamp, or use logging tools/audit logs.', keywords: ['clear screenshots', 'user identification', 'timestamp', 'logging tools', 'audit logs'] },
                { id: 6, question: 'Why is it important to check a user\'s past infractions before deciding on a punishment?', correct_answer: 'A minor first offense may only need a verbal reminder, while repeated infractions require a firmer response.', keywords: ['minor first offense', 'verbal reminder', 'repeated infractions', 'firmer response'] },

                { id: 8, question: 'What is the primary purpose of the final step: Log Your Punishment?', correct_answer: 'So the staff team stays coordinated across all shifts, and other moderators can review the case if needed.', keywords: ['staff team', 'coordinated', 'shifts', 'review the case'] },
                { id: 9, question: 'Where do we record proof?', correct_answer: 'In the staff database, saving screenshots and logging the context/conversation.', keywords: ['staff database', 'saving screenshots', 'logging context'] }
            ],
            '003': [
                { id: 1, question: 'Why is it essential for the staff member claiming an appeal ticket to be impartial?', correct_answer: 'The moderator who claims the ticket must have had no involvement in the original case. Objectivity is the priority; you must approach the appeal without personal bias.', keywords: ['no involvement', 'original case', 'objectivity', 'priority', 'without personal bias'] },
                { id: 2, question: 'What is the first step a staff member must take after claiming an appeal ticket?', correct_answer: 'Revision of punishment and evidence provided by the prosecutor (carefully review the logs or screenshots that led to the initial disciplinary action).', keywords: ['revision', 'punishment', 'evidence', 'prosecutor', 'logs', 'screenshots'] },

                { id: 4, question: 'What should an adjudicator look for when reviewing evidence provided by the defense?', correct_answer: 'Read the user\'s explanation and examine any counter-proof they have submitted. Verify if their defense provides context that changes the nature of the event.', keywords: ['read', 'explanation', 'counter-proof', 'verify', 'defense', 'context', 'changes'] },

                { id: 6, question: 'What are the three possible outcomes that can be reached during the decision step?', correct_answer: 'Uphold the original penalty, reduce it, or overturn it entirely.', keywords: ['uphold', 'original penalty', 'reduce', 'overturn'] },
                { id: 7, question: 'What is the duration and purpose of the probation period for an approved appeal?', correct_answer: '1 week. Purpose: To ensure the reinstated user can follow the rules.', keywords: ['1 week', 'week', 'ensure', 'reinstated user', 'follow the rules'] },
                { id: 8, question: 'How often is a user monitored during the final surveillance step of the process?', correct_answer: 'Once every thirty days.', keywords: ['once', 'every thirty days', '30 days', 'thirty days'] },

                { id: 3, question: 'What should a moderator look for when monitoring for technical exploits?', correct_answer: 'Watch for players exploiting, then report it to the devs so they can improve the shield for the next event.', keywords: ['exploiting', 'report', 'devs', 'improve', 'shield'] },
                { id: 4, question: 'How do you distinguish between a harmless player and a security threat?', correct_answer: 'Distinguish between harmless excitement and intentional security breaches. A threat is someone trolling, exploiting, or flying; a harmless player just wants to enjoy the event.', keywords: ['harmless excitement', 'intentional security breaches', 'trolling', 'exploiting', 'flying'] },
                { id: 5, question: 'What moderation tools can be used for Crowd Stabilization?', correct_answer: 'Freeze and teleport (to move disruptors away from the group).', keywords: ['freeze', 'teleport', 'move disruptors'] },
                { id: 6, question: 'Why is it important to maintain a calm demeanor if a security breach occurs?', correct_answer: 'Because if you stay calm, the community stays at ease; if you panic, you may cause panic among the community.', keywords: ['stay calm', 'community stays at ease', 'panic', 'cause panic'] },
                { id: 7, question: 'What is the final step after an event has successfully concluded?', correct_answer: 'Post-event analysis and logging.', keywords: ['post-event analysis', 'logging'] },
                { id: 8, question: 'How does post-event logging assist the development team?', correct_answer: 'It helps developers build a stronger shield for future events.', keywords: ['developers', 'stronger shield', 'future events'] },
                { id: 9, question: 'What is the moderator\'s role during Perimeter Monitoring?', correct_answer: 'To watch the crowd for exploiters.', keywords: ['watch', 'crowd', 'exploiters'] },
                { id: 10, question: 'How does moving a disruptor to a different coordinate help the event?', correct_answer: 'So the event can resume normally, with no trolls and no exploiters with unfair advantages.', keywords: ['resume normally', 'no trolls', 'no exploiters', 'unfair advantages'] }
            ]
        };

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const toastMsg = document.getElementById('toastMessage');
            toastMsg.innerHTML = `<i class="ri-${type === 'success' ? 'check-line' : 'error-warning-line'} mr-2"></i>${message}`;
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 3000);
        }

        async function loadQuestions() {
            const container = document.getElementById('questionsContainer');
            const config = phaseSettings[currentPhase];
            
            document.getElementById('phaseInfo').innerHTML = `
                <div class="flex justify-between items-center flex-wrap gap-2">
                    <span class="text-gray-300"><i class="ri-information-line mr-2"></i>${config.name}</span>
                    <span class="text-gray-400 text-sm">Need ${config.passing}/${config.total} to pass</span>
                </div>
            `;
            
            // Load from Firestore
            const questionsRef = collection(db, `phases/${currentPhase}/questions`);
            const querySnapshot = await getDocs(questionsRef);
            
            let questions = [];
            querySnapshot.forEach(doc => {
                questions.push({ id: doc.id, ...doc.data() });
            });
            
            if (questions.length === 0) {
                // Initialize with default questions
                const defaults = DEFAULT_QUESTIONS[currentPhase] || [];
                for (const q of defaults) {
                    await addDoc(collection(db, `phases/${currentPhase}/questions`), q);
                }
                questions = defaults;
            }
            
            questions.sort((a,b) => parseInt(a.id) - parseInt(b.id));
            
            if (!questions.length) {
                container.innerHTML = `
                    <div class="text-center py-12 bg-gray-800/30 rounded-xl">
                        <i class="ri-question-line text-5xl text-gray-600 mb-3 block"></i>
                        <p class="text-gray-400">No questions for this phase yet.</p>
                        <button onclick="openAddQuestionModal()" class="mt-4 px-4 py-2 bg-green-600/20 rounded-lg text-green-300">Add First Question</button>
                    </div>
                `;
                return;
            }

            container.innerHTML = questions.map(q => `
                <div class="bg-gray-800/30 rounded-xl p-5 border border-gray-700/50 card-hover transition-all">
                    <div class="flex justify-between items-start">
                        <div class="flex-1">
                            <div class="flex items-center gap-2 mb-3 flex-wrap">
                                <span class="bg-purple-600/30 text-purple-300 text-xs font-medium px-2 py-1 rounded-full">Q${q.id}</span>
                                <span class="text-gray-500 text-xs"><i class="ri-keyword-line"></i> ${q.keywords?.length || 0} keywords</span>
                            </div>
                            <p class="text-white font-medium mb-3">${escapeHtml(q.question)}</p>
                            <div class="bg-gray-900/50 rounded-lg p-3 mb-2">
                                <span class="text-green-400 text-xs"><i class="ri-checkbox-circle-line"></i> Correct Answer:</span>
                                <p class="text-gray-300 text-sm mt-1">${escapeHtml(q.correct_answer)}</p>
                            </div>
                            <div class="flex flex-wrap gap-1">
                                ${q.keywords?.map(k => `<span class="bg-gray-700/50 text-gray-400 text-xs px-2 py-0.5 rounded-full">${escapeHtml(k)}</span>`).join('') || ''}
                            </div>
                        </div>
                        <button onclick="openEditModal('${q.id}')" class="ml-4 p-2 hover:bg-gray-700 rounded-lg transition text-gray-400 hover:text-white">
                            <i class="ri-edit-line text-lg"></i>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function saveQuestion() {
            const id = currentEditId;
            const questionNumber = document.getElementById('editQuestionNumber').value;
            const questionText = document.getElementById('editQuestionText').value;
            const answer = document.getElementById('editAnswer').value;
            const keywords = document.getElementById('editKeywords').value.split(',').map(k => k.trim());
            
            const questionRef = doc(db, `phases/${currentPhase}/questions`, id);
            await updateDoc(questionRef, {
                id: parseInt(questionNumber),
                question: questionText,
                correct_answer: answer,
                keywords: keywords
            });
            
            closeModal('editModal');
            loadQuestions();
            showToast('Question updated successfully!');
        }

        async function deleteQuestion() {
            if (confirm('Are you sure you want to delete this question?')) {
                const questionRef = doc(db, `phases/${currentPhase}/questions`, currentEditId);
                await deleteDoc(questionRef);
                closeModal('editModal');
                loadQuestions();
                showToast('Question deleted');
            }
        }

        async function addQuestion() {
            const questionNumber = document.getElementById('addQuestionNumber').value;
            const questionText = document.getElementById('addQuestionText').value;
            const answer = document.getElementById('addAnswer').value;
            const keywords = document.getElementById('addKeywords').value.split(',').map(k => k.trim());
            
            await addDoc(collection(db, `phases/${currentPhase}/questions`), {
                id: parseInt(questionNumber),
                question: questionText,
                correct_answer: answer,
                keywords: keywords
            });
            
            closeModal('addModal');
            document.getElementById('addQuestionNumber').value = '';
            document.getElementById('addQuestionText').value = '';
            document.getElementById('addAnswer').value = '';
            document.getElementById('addKeywords').value = '';
            loadQuestions();
            showToast('Question added successfully!');
        }

        async function saveSettings() {
            const name = document.getElementById('settingsPhaseName').value;
            const total = parseInt(document.getElementById('settingsTotal').value);
            const passing = parseInt(document.getElementById('settingsPassing').value);
            
            phaseSettings[currentPhase] = { name, total, passing };
            
            // Save to Firestore
            await setDoc(doc(db, 'phaseSettings', currentPhase), phaseSettings[currentPhase]);
            
            closeModal('settingsModal');
            loadQuestions();
            showToast('Settings saved!');
        }

        function openEditModal(id) {
            currentEditId = id;
            // Load question data and populate modal
            document.getElementById('editModal').classList.remove('hidden');
        }

        function openAddQuestionModal() {
            document.getElementById('addModal').classList.remove('hidden');
        }

        function openSettingsModal() {
            const settings = phaseSettings[currentPhase];
            document.getElementById('settingsPhaseName').value = settings.name;
            document.getElementById('settingsTotal').value = settings.total;
            document.getElementById('settingsPassing').value = settings.passing;
            document.getElementById('settingsModal').classList.remove('hidden');
        }

        function closeModal(modalId) {
            document.getElementById(modalId).classList.add('hidden');
        }

        function exportData() {
            const data = {
                questions: DEFAULT_QUESTIONS,
                settings: phaseSettings,
                exportDate: new Date().toISOString()
            };
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `sgfrp_backup_${currentPhase}.json`;
            a.click();
            URL.revokeObjectURL(url);
            showToast('Data exported!');
        }

        function logout() {
            signOut(auth);
            window.location.href = 'login.html';
        }

        // Auth state listener
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('currentUser').textContent = user.email;
                
                // Load phase settings from Firestore
                const settingsRef = await getDoc(doc(db, 'phaseSettings', currentPhase));
                if (settingsRef.exists()) {
                    Object.assign(phaseSettings[currentPhase], settingsRef.data());
                }
                
                loadQuestions();
            } else {
                window.location.href = 'login.html';
            }
        });

        // Phase button handlers
        document.querySelectorAll('.phase-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.phase-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentPhase = btn.dataset.phase;
                loadQuestions();
            });
        });
        
        document.getElementById('adminPanelBtn').addEventListener('click', () => {
            window.location.href = 'admin.html';
        });
        
        // Set active phase button
        document.querySelector('.phase-btn').classList.add('active');
    </script>
</body>
</html>
