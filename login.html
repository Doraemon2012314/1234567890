<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGFRP Admin Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0e27;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-box {
            background: #0f1433;
            border-radius: 16px;
            padding: 40px;
            width: 380px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            border: 1px solid #1a2050;
        }
        .logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .logo h1 {
            color: white;
            font-size: 24px;
        }
        .logo p {
            color: #6b7280;
            font-size: 14px;
            margin-top: 8px;
        }
        .input-group {
            margin-bottom: 20px;
        }
        .input-group label {
            display: block;
            color: #9ca3af;
            font-size: 14px;
            margin-bottom: 8px;
        }
        .input-group input {
            width: 100%;
            padding: 12px 16px;
            background: #0a0e24;
            border: 1px solid #1f2940;
            border-radius: 8px;
            color: white;
            font-size: 14px;
            outline: none;
        }
        .input-group input:focus {
            border-color: #3b82f6;
        }
        .login-btn {
            width: 100%;
            padding: 12px;
            background: #1e3a8a;
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        .login-btn:hover {
            background: #2563eb;
        }
        .error-msg {
            background: #7f1d1d;
            border: 1px solid #991b1b;
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 20px;
            color: #fca5a5;
            font-size: 14px;
            text-align: center;
            display: none;
        }
        .footer {
            text-align: center;
            margin-top: 24px;
            color: #4b5563;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="logo">
            <h1>SGFRP Admin</h1>
            <p>Informational Phases Management</p>
        </div>
        
        <div id="loginError" class="error-msg">Invalid username or password</div>
        
        <div class="input-group">
            <label>Username</label>
            <input type="text" id="username" placeholder="Enter username">
        </div>
        <div class="input-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Enter password" onkeypress="if(event.key === 'Enter') login()">
        </div>
        <button class="login-btn" onclick="login()">Login</button>
        <div class="footer">SGFRP Moderation Team</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD1LtDoqN6yMP70xLbY_8HRkM4STJvFk0M",
            authDomain: "project-6644503116144405608.firebaseapp.com",
            projectId: "project-6644503116144405608",
            storageBucket: "project-6644503116144405608.firebasestorage.app",
            messagingSenderId: "565051436196",
            appId: "1:565051436196:web:87b40921cd6db7c0548a31",
            measurementId: "G-JXGMLVT038"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.login = async () => {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('loginError');
            
            if (!username || !password) {
                errorDiv.style.display = 'block';
                setTimeout(() => errorDiv.style.display = 'none', 3000);
                return;
            }
            
            try {
                const usersRef = collection(db, 'admins');
                const q = query(usersRef, where('username', '==', username), where('password', '==', password));
                const querySnapshot = await getDocs(q);
                
                if (querySnapshot.empty) {
                    errorDiv.style.display = 'block';
                    setTimeout(() => errorDiv.style.display = 'none', 3000);
                    return;
                }
                
                const userDoc = querySnapshot.docs[0];
                const userData = userDoc.data();
                sessionStorage.setItem('sgfrp_user', JSON.stringify({
                    id: userDoc.id,
                    username: userData.username,
                    role: userData.role
                }));
                window.location.href = 'index.html';
            } catch (error) {
                errorDiv.style.display = 'block';
                setTimeout(() => errorDiv.style.display = 'none', 3000);
            }
        };
    </script>
</body>
</html>
