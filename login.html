<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGFRP - Admin Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        .gradient-bg { background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 100%); }
    </style>
</head>
<body class="gradient-bg min-h-screen flex items-center justify-center">
    <div class="bg-gray-800/50 backdrop-blur-sm rounded-2xl p-8 w-full max-w-md mx-4 border border-gray-700 shadow-2xl">
        <div class="text-center mb-8">
            <div class="w-20 h-20 bg-gradient-to-r from-purple-500 to-pink-500 rounded-2xl flex items-center justify-center mx-auto mb-4">
                <i class="ri-shield-star-line text-white text-4xl"></i>
            </div>
            <h2 class="text-2xl font-bold text-white">SGFRP Admin Portal</h2>
            <p class="text-gray-400 text-sm mt-2">Informational Phases Management</p>
        </div>
        
        <div id="loginError" class="hidden bg-red-600/20 border border-red-500/50 rounded-lg p-3 mb-4 text-red-300 text-sm text-center">
            Invalid email or password
        </div>
        
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-1">Email</label>
                <input type="email" id="email" class="w-full bg-gray-900 border border-gray-600 rounded-xl px-4 py-3 text-white focus:ring-2 focus:ring-purple-500" placeholder="admin@sgfrp.com">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-1">Password</label>
                <input type="password" id="password" class="w-full bg-gray-900 border border-gray-600 rounded-xl px-4 py-3 text-white focus:ring-2 focus:ring-purple-500" placeholder="Enter password" onkeypress="if(event.key === 'Enter') login()">
            </div>
            <button onclick="login()" class="w-full py-3 bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-700 hover:to-pink-700 rounded-xl font-semibold transition-all duration-200 mt-4">
                <i class="ri-login-box-line mr-2"></i>Login
            </button>
        </div>
        
        <div class="mt-6 text-center text-xs text-gray-500">
            <i class="ri-shield-check-line"></i> Secure Admin Access
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD1LtDoqN6yMP70xLbY_8HRkM4STJvFk0M",
            authDomain: "project-6644503116144405608.firebaseapp.com",
            projectId: "project-6644503116144405608",
            storageBucket: "project-6644503116144405608.firebasestorage.app",
            messagingSenderId: "565051436196",
            appId: "1:565051436196:web:87b40921cd6db7c0548a31",
            measurementId: "G-JXGMLVT038"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        window.login = async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('loginError');
            
            try {
                await signInWithEmailAndPassword(auth, email, password);
                window.location.href = 'index.html';
            } catch (error) {
                errorDiv.classList.remove('hidden');
                setTimeout(() => errorDiv.classList.add('hidden'), 3000);
            }
        };
    </script>
</body>
</html>
