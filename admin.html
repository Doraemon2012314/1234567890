<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGFRP - User Management</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0e27;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: #e5e7eb;
        }
        .header {
            background: #0f1433;
            border-bottom: 1px solid #1a2050;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logo-icon {
            background: #1e3a8a;
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        .logo-text h2 {
            font-size: 18px;
            color: white;
        }
        .logo-text p {
            font-size: 12px;
            color: #6b7280;
        }
        .back-btn {
            background: #1e3a8a;
            padding: 8px 16px;
            border-radius: 8px;
            color: white;
            text-decoration: none;
            font-size: 14px;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
            padding: 32px 24px;
        }
        .card {
            background: #0f1433;
            border: 1px solid #1a2050;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
        }
        .card h2 {
            font-size: 18px;
            margin-bottom: 20px;
            color: white;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            color: #9ca3af;
            font-size: 13px;
            margin-bottom: 6px;
        }
        .form-group input {
            width: 100%;
            padding: 10px 12px;
            background: #0a0e24;
            border: 1px solid #1f2940;
            border-radius: 8px;
            color: white;
            font-size: 14px;
        }
        .form-group input:focus {
            outline: none;
            border-color: #3b82f6;
        }
        .btn-create {
            background: #1e3a8a;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            font-size: 14px;
            width: 100%;
        }
        .user-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .user-item {
            background: #0a0e24;
            border: 1px solid #1f2940;
            border-radius: 12px;
            padding: 14px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .user-info .username {
            font-weight: 600;
            color: white;
            margin-bottom: 4px;
        }
        .user-info .role {
            font-size: 11px;
            color: #6b7280;
        }
        .current-badge {
            background: #064e3b;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            color: #6ee7b7;
        }
        .remove-btn {
            background: #7f1d1d;
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 12px;
            color: #fca5a5;
            cursor: pointer;
            border: none;
        }
        .empty-text {
            text-align: center;
            color: #6b7280;
            padding: 24px;
        }
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: #1f2937;
            padding: 12px 20px;
            border-radius: 8px;
            color: white;
            font-size: 14px;
            display: none;
            z-index: 100;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo-area">
            <div class="logo-icon">👥</div>
            <div class="logo-text">
                <h2>User Management</h2>
                <p>Add or Remove Admin Users</p>
            </div>
        </div>
        <a href="index.html" class="back-btn">← Back</a>
    </div>

    <div class="container">
        <div class="card">
            <h2>➕ Add New Admin</h2>
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="newUsername" placeholder="BennySparrow">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="newPassword" placeholder="Enter password">
            </div>
            <button class="btn-create" onclick="addUser()">➕ Create User</button>
        </div>

        <div class="card">
            <h2>👥 Existing Admins</h2>
            <div id="usersList" class="user-list">
                <div class="empty-text">Loading...</div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
        import { getFirestore, collection, getDocs, addDoc, deleteDoc, doc, query, where } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD1LtDoqN6yMP70xLbY_8HRkM4STJvFk0M",
            authDomain: "project-6644503116144405608.firebaseapp.com",
            projectId: "project-6644503116144405608",
            storageBucket: "project-6644503116144405608.firebasestorage.app",
            messagingSenderId: "565051436196",
            appId: "1:565051436196:web:87b40921cd6db7c0548a31",
            measurementId: "G-JXGMLVT038"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        let currentUsername = null;
        
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 3000);
        }
        
        async function loadUsers() {
            const usersList = document.getElementById('usersList');
            const snapshot = await getDocs(collection(db, 'admins'));
            const users = [];
            snapshot.forEach(doc => users.push({ id: doc.id, ...doc.data() }));
            
            if (users.length === 0) {
                usersList.innerHTML = '<div class="empty-text">No users found. Create your first admin above.</div>';
                return;
            }
            
            usersList.innerHTML = users.map(user => `
                <div class="user-item">
                    <div class="user-info">
                        <div class="username">${escapeHtml(user.username)}</div>
                        <div class="role">${user.role || 'admin'}</div>
                    </div>
                    <div>
                        ${user.username === currentUsername ? 
                            '<span class="current-badge">You</span>' : 
                            `<button class="remove-btn" onclick="removeUser('${user.id}', '${user.username}')">Remove</button>`
                        }
                    </div>
                </div>
            `).join('');
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        window.addUser = async () => {
            const username = document.getElementById('newUsername').value.trim();
            const password = document.getElementById('newPassword').value;
            
            if (!username || !password) {
                showToast('Username and password are required');
                return;
            }
            
            try {
                const existing = await getDocs(query(collection(db, 'admins'), where('username', '==', username)));
                if (!existing.empty) {
                    showToast('Username already exists');
                    return;
                }
                
                await addDoc(collection(db, 'admins'), {
                    username: username,
                    password: password,
                    role: 'admin',
                    createdAt: new Date().toISOString()
                });
                
                document.getElementById('newUsername').value = '';
                document.getElementById('newPassword').value = '';
                await loadUsers();
                showToast(`User ${username} created`);
            } catch (error) {
                showToast('Error: ' + error.message);
            }
        };
        
        window.removeUser = async (userId, username) => {
            if (confirm(`Remove ${username}?`)) {
                try {
                    await deleteDoc(doc(db, 'admins', userId));
                    await loadUsers();
                    showToast(`${username} removed`);
                } catch (error) {
                    showToast('Error: ' + error.message);
                }
            }
        };
        
        // Check login
        const savedUser = sessionStorage.getItem('sgfrp_user');
        if (!savedUser) {
            window.location.href = 'login.html';
        } else {
            currentUsername = JSON.parse(savedUser).username;
            loadUsers();
        }
    </script>
</body>
</html>
